worker_processes  1;
error_log  logs/error.log info;

events {
    worker_connections  1024;
}

rtmp {
    server {
        listen 1935;

        application live {
            live on;
            hls on;
            hls_path temp/hls;
            hls_fragment 1s;
            hls_playlist_length 3s;
            hls_continuous on;
            hls_cleanup on;
        }
    }
}

http {
    server {
        listen 8088;

        location / {
            root html;
            index index.html;
        }

        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            alias temp/hls;
            expires -1;
        }

        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root html;
        }
    }
}
